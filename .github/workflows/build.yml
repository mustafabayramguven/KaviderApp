name: Android Bulut Derleme

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Kodu Çek
      uses: actions/checkout@v4
      
    - name: Java 17 Kur
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Gradle Kur (Uyumlu Sürüm)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7' # Kotlin 1.9.20 ile tam uyumlu sürüm

    - name: APK Derle
      run: gradle assembleDebug --stacktrace
      
    - name: APK'yı İndirmeye Hazırla
      uses: actions/upload-artifact@v4
      with:
        name: Kavider-APK
        path: app/build/outputs/apk/debug/app-debug.apk
